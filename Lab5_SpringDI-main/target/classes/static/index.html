<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quản Lý Sinh Viên</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        *{
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            margin:0;
            padding:30px;
        }

        .container{
            max-width:1000px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        h2{
            margin-top:30px;
        }

        .search-box{
            background:#f5f7fb;
            padding:15px;
            border-radius:10px;
            display:flex;
            align-items:center;
            gap:10px;
            margin-bottom:25px;
        }

        input{
            padding:10px;
            border-radius:8px;
            border:1px solid #ccc;
            outline:none;
        }

        input:focus{
            border-color:#4facfe;
        }

        button{
            padding:8px 14px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:500;
        }

        .btn-submit{
            background:#2ecc71;
            color:white;
        }

        .btn-submit:hover{
            background:#27ae60;
        }

        .btn-edit{
            background:#f1c40f;
        }

        .btn-delete{
            background:#e74c3c;
            color:white;
        }

        .btn-search{
            background:#3498db;
            color:white;
        }

        .btn-reset{
            background:#7f8c8d;
            color:white;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
            overflow:hidden;
            border-radius:10px;
        }

        thead{
            background:#4facfe;
            color:white;
        }

        th,td{
            padding:12px;
            text-align:left;
        }

        tbody tr:nth-child(even){
            background:#f9f9f9;
        }

        tbody tr:hover{
            background:#eef5ff;
        }

        .empty-row{
            text-align:center;
            color:red;
            font-weight:bold;
        }

        .form-group{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .form-group input{
            flex:1;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>🎓 Hệ Thống Quản Lý Sinh Viên</h1>

    <div class="search-box">

        <label><b>🔍 Tìm kiếm</b></label>

        <input type="number" id="searchId" placeholder="Nhập ID...">

        <button class="btn-search" onclick="searchStudent()">Tìm</button>

        <button class="btn-reset" onclick="resetSearch()">Hiển thị tất cả</button>

    </div>

    <h2 id="formTitle">➕ Thêm Sinh Viên</h2>

    <form id="studentForm" class="form-group" onsubmit="saveStudent(event)">

        <input type="hidden" id="studentId">

        <input type="text" id="name" placeholder="Họ và tên" required>

        <input type="email" id="email" placeholder="Email" required>

        <input type="number" id="age" placeholder="Tuổi" required>

        <button type="submit" class="btn-submit" id="submitBtn">
            Lưu
        </button>

        <button type="button" onclick="resetForm()" class="btn-reset" style="display:none;" id="cancelBtn">
            Hủy
        </button>

    </form>

    <h2>📋 Danh Sách Sinh Viên</h2>

    <table>

        <thead>

        <tr>
            <th>ID</th>
            <th>Họ Tên</th>
            <th>Email</th>
            <th>Tuổi</th>
            <th>Hành động</th>
        </tr>

        </thead>

        <tbody id="studentTableBody">

        </tbody>

    </table>

</div>

<script>

    const apiUrl = '/students';

    function loadStudents() {
    fetch(apiUrl)
    .then(response => response.json())
    .then(data => {
    renderTable(data);
    })
    .catch(error => console.error('Lỗi:', error));
    }

    function renderTable(students) {

    const tbody = document.getElementById('studentTableBody');

    tbody.innerHTML = '';

    if (!students || students.length === 0) {

    tbody.innerHTML =
    `<tr>
    <td colspan="5" class="empty-row">
    Không có dữ liệu sinh viên
    </td>
    </tr>`;

    return;

    }

    students.forEach(student => {

    tbody.innerHTML +=
    `
    <tr>
    <td>${student.id}</td>
    <td>${student.name}</td>
    <td>${student.email}</td>
    <td>${student.age}</td>

    <td>

    <button class="btn-edit"
    onclick="editStudent(${student.id},'${student.name}','${student.email}',${student.age})">
    Sửa
    </button>

    <button class="btn-delete"
    onclick="deleteStudent(${student.id})">
    Xóa
    </button>

    </td>

    </tr>
    `;

    });

    }

    function searchStudent() {

    const id = document.getElementById('searchId').value;

    if (!id) {
    alert("Vui lòng nhập ID");
    return;
    }

    fetch(`${apiUrl}/${id}`)

    .then(response => {

    if (!response.ok) throw new Error("Không tìm thấy");

    return response.json();

    })

    .then(student => {

    if (student && student.id) {

    renderTable([student]);

    } else {

    renderTable([]);

    }

    })

    .catch(error => {

    renderTable([]);

    });

    }

    function resetSearch() {

    document.getElementById('searchId').value="";

    loadStudents();

    }

    function saveStudent(event) {

    event.preventDefault();

    const id = document.getElementById('studentId').value;

    const studentData = {

    name:document.getElementById('name').value,

    email:document.getElementById('email').value,

    age:document.getElementById('age').value

    };

    const method = id ? 'PUT':'POST';

    const url = id ? `${apiUrl}/${id}` : apiUrl;

    fetch(url,{
    method:method,
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(studentData)
    })

    .then(()=>{

    alert(id?'Cập nhật thành công':'Thêm thành công');

    resetForm();

    resetSearch();

    })

    .catch(error=>console.error('Lỗi:',error));

    }

    function deleteStudent(id){

    if(confirm('Bạn có chắc muốn xóa?')){

    fetch(`${apiUrl}/${id}`,{method:'DELETE'})

    .then(()=>{

    alert('Đã xóa');

    resetSearch();

    })

    .catch(error=>console.error('Lỗi:',error));

    }

    }

    function editStudent(id,name,email,age){

    document.getElementById('formTitle').innerText="✏️ Sửa Sinh Viên";

    document.getElementById('submitBtn').innerText="Cập Nhật";

    document.getElementById('cancelBtn').style.display="inline-block";

    document.getElementById('studentId').value=id;

    document.getElementById('name').value=name;

    document.getElementById('email').value=email;

    document.getElementById('age').value=age;

    window.scrollTo({top:0,behavior:'smooth'});

    }

    function resetForm(){

    document.getElementById('studentForm').reset();

    document.getElementById('studentId').value="";

    document.getElementById('formTitle').innerText="➕ Thêm Sinh Viên";

    document.getElementById('submitBtn').innerText="Lưu";

    document.getElementById('cancelBtn').style.display="none";

    }

    window.onload=loadStudents;

</script>

</body>
</html>
